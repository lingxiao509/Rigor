<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans SC',system-ui,sans-serif;background:#0c0d12;color:#e5e7eb;min-height:100vh;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
input,select,textarea,button{font-family:inherit;outline:none}

/* ── Layout container ── */
.app-wrap{max-width:960px;margin:0 auto;padding-bottom:68px}

/* ── Components ── */
.bar{background:#111318ee;border-bottom:1px solid #1e2130;padding:14px 20px;position:sticky;top:0;z-index:20;backdrop-filter:blur(12px)}
.inp{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #2a2e3e;background:#181b24;color:#e5e7eb;font-size:14px}
.inp:focus{border-color:#6366f1}
.card{background:#151821;border:1px solid #1e2130;border-radius:12px;padding:14px;margin-bottom:10px;transition:border-color .15s}
.card:hover{border-color:#2a2e3e}
.btn{padding:11px 20px;border-radius:8px;border:none;color:#fff;font-size:14px;font-weight:600;cursor:pointer;width:100%;transition:opacity .15s}
.btn:hover{opacity:.9}
.sm{padding:6px 14px;border-radius:6px;border:none;color:#fff;font-size:12px;font-weight:500;cursor:pointer;transition:opacity .15s}
.sm:hover{opacity:.85}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:960px;background:#111318ee;border-top:1px solid #1e2130;display:flex;z-index:30;backdrop-filter:blur(12px)}
.nav button{flex:1;padding:10px 0 8px;border:none;background:transparent;color:#4b5563;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;transition:color .15s}
.nav button.on{color:#818cf8}
.nav button span:first-child{font-size:18px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px}
.item{padding:12px 10px;border-bottom:1px solid #13161e;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .12s}
.item:hover{background:#1a1d27}
.qcg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.qcb{padding:10px 6px;border-radius:8px;border:1px solid #2a2e3e;background:#111318;color:#6b7280;font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s}
.qcb:hover{border-color:#4b5563}
.qcb.on{border-color:#34d39940;background:#0d542b20;color:#34d399}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;display:flex;align-items:center;justify-content:center}
.modal{background:#1a1d27;border-radius:16px;width:90%;max-width:480px;padding:24px;max-height:85vh;overflow-y:auto}
.path-box{background:#0d1117;border:1px solid #1e2130;border-radius:6px;padding:10px 12px;font-family:'Cascadia Code',monospace;font-size:12px;color:#7dd3fc;word-break:break-all;margin:4px 0}
.copy-btn{background:#1e3a5f;border:1px solid #2563eb40;color:#60a5fa;padding:4px 12px;border-radius:4px;font-size:11px;cursor:pointer;transition:background .15s}
.copy-btn:hover{background:#2563eb}
.form-row{margin-bottom:12px}
.form-label{font-size:12px;color:#6b7280;margin-bottom:4px}
.edit-btn{background:none;border:1px solid #2a2e3e;color:#9ca3af;padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;transition:all .15s}
.edit-btn:hover{border-color:#6366f1;color:#818cf8}
.del-btn{background:none;border:1px solid #5c1a1a;color:#f87171;padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;transition:all .15s}
.del-btn:hover{background:#5c1a1a}

/* ── Desktop: wider layout, bigger text, grid layouts ── */
@media(min-width:768px){
  .app-wrap{padding:0 24px 80px}
  .bar{padding:16px 24px;border-radius:0 0 12px 12px;margin:0 -24px}
  .nav button{font-size:12px;padding:12px 0 10px;flex-direction:row;gap:6px}
  .nav button span:first-child{font-size:16px}
  .inp{font-size:15px;padding:11px 16px}
  .btn{font-size:15px;padding:12px 24px}
  .sm{font-size:13px;padding:7px 16px}
  .tag{font-size:11px;padding:2px 10px}
  .item{padding:14px 12px;gap:12px}
  .card{padding:18px;margin-bottom:12px;border-radius:14px}
  .qcg{grid-template-columns:repeat(6,1fr)}
  .qcb{padding:12px 8px;font-size:12px}
  .form-row{margin-bottom:14px}
  .form-label{font-size:13px}
  .path-box{font-size:13px}
  .modal{padding:30px}
  /* Two-column grids on desktop */
  .dash-series{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .dash-stats{grid-template-columns:repeat(5,1fr)!important}
  .dash-pipe{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .detail-info{grid-template-columns:1fr 1fr 1fr 1fr!important}
  .sub-cat-grid{grid-template-columns:repeat(3,1fr)!important}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
}

/* ── Mobile: compact ── */
@media(max-width:767px){
  .app-wrap{max-width:540px;margin:0 auto}
  .overlay{align-items:flex-end}
  .modal{border-radius:16px 16px 0 0;width:100%;max-width:540px}
}

async function hashPwd(pwd){const enc=new TextEncoder().encode(pwd);const buf=await crypto.subtle.digest("SHA-256",enc);return Array.from(new Uint8Array(buf)).slice(0,6).map(b=>b.toString(16).padStart(2,"0")).join("");}

const ROOT="RIGOR_Data";
const smap={"PS微球":"PolyRef/PS","PMMA微球":"PolyRef/PMMA","PET微球":"PolyRef/PET","PE微球":"PolyRef/PE","PP微球":"PolyRef/PP","PVC微球":"PolyRef/PVC","功能化PS微球":"PolyRef/PS-Func","PS荧光微球(绿)":"PolyRef/PS-FL-Green","PS荧光微球(橙红)":"PolyRef/PS-FL-Orange","PS荧光微球(蓝)":"PolyRef/PS-FL-Blue","PMMA荧光微球(绿)":"PolyRef/PMMA-FL-Green","PMMA荧光微球(橙红)":"PolyRef/PMMA-FL-Orange","PMMA荧光微球(蓝)":"PolyRef/PMMA-FL-Blue","染色PS微球":"PolyRef/PS-Dyed","磁性微球":"PolyRef/Magnetic","生物磁珠":"RigorMag/BioMag","生物磁珠&微球":"RigorMag/BioMag","离心柱":"RigorPrep/SpinColumn","色谱柱":"RigorMAb/HPLCColumn","96孔板":"RigorPlate/Plate"};
function makePath(d){const base=smap[d.c]||"Other/"+d.c.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g,"_");const sku=(d.k||d.m||"item").replace(/[\\/:*?"<>|\s]+/g,"_");const bat=(d.b||"nobatch").replace(/[\\/:*?"<>|\s]+/g,"_");return ROOT+"/"+base+"/"+sku+"_"+bat;}

// ═══ 外部批号转换 ═══
// 编码规则: [系列1位][月份1位][年份1位][日期2位][产线1位][颜色1位(可选)]
// 月份: 1-9=Jan-Sep, A=Oct, B=Nov, C=Dec
// 年份: 末位数字 (2025→5, 2026→6)
const SERIES_CODE={"PS微球":"P","PMMA微球":"P","PET微球":"P","PE微球":"P","PP微球":"P","PVC微球":"P","功能化PS微球":"P","PS荧光微球(绿)":"F","PS荧光微球(橙红)":"F","PS荧光微球(蓝)":"F","PMMA荧光微球(绿)":"F","PMMA荧光微球(橙红)":"F","PMMA荧光微球(蓝)":"F","染色PS微球":"C","磁性微球":"M","生物磁珠":"B","离心柱":"S","色谱柱":"H"};
const COLOR_CODE={"PS荧光微球(绿)":"G","PS荧光微球(橙红)":"O","PS荧光微球(蓝)":"B","PMMA荧光微球(绿)":"G","PMMA荧光微球(橙红)":"O","PMMA荧光微球(蓝)":"B"};
function genExtBatch(cat,batch,line){
  if(!batch||batch.length<8)return"";
  const s=SERIES_CODE[cat]||"X";
  const y=batch.substring(0,4);const m=parseInt(batch.substring(4,6));const day=batch.substring(6,8);
  const mCode="ABCDEFGHIJKL".charAt(m-1)||"X";
  const yCode=y.charAt(3);
  const ln=line||"1";
  const clr=COLOR_CODE[cat]||"";
  return s+mCode+yCode+day+ln+clr;
}

// ═══ SUPABASE + LOCAL STORAGE (国内可用，免费) ═══
let items, allLogs, pipe, lastSync="";
let sbClient=null, sbConnected=false, sbSaving=false, sbPollTimer=null, _lastSbUpdate="";
const SB_KEY="RIGOR_SB_CONFIG";

function getSBConfig(){
  try{const s=localStorage.getItem(SB_KEY);return s?JSON.parse(s):null;}catch(e){return null;}
}
function saveSBConfig(cfg){localStorage.setItem(SB_KEY,JSON.stringify(cfg));}

async function initSupabase(cfg){
  try{
    sbClient=supabase.createClient(cfg.url,cfg.anonKey);
    // Check if table exists by trying to select
    const{data,error}=await sbClient.from("rigor_inventory").select("id,updated_at").eq("data_key","main").limit(1);
    if(error&&error.code==="42P01"){
      // Table doesn't exist - need user to create it
      alert("请先在 Supabase 控制台创建表，详见同步页面的说明。");
      sbConnected=false;return false;
    }
    sbConnected=true;
    await pullFromCloud();
    if(sbPollTimer)clearInterval(sbPollTimer);
    sbPollTimer=setInterval(pollCloud,5000);
    return true;
  }catch(e){console.error("Supabase init error:",e);sbConnected=false;return false;}
}

async function pullFromCloud(){
  if(!sbClient)return;
  try{
    const{data,error}=await sbClient.from("rigor_inventory").select("id,payload,updated_at").eq("data_key","main").limit(1).single();
    if(error||!data)return;
    _lastSbUpdate=data.updated_at;
    const d=typeof data.payload==="string"?JSON.parse(data.payload):data.payload;
    if(d&&d.items){
      items=d.items;allLogs=d.logs||[];pipe=d.pipe||pipe;
      applySeriesSubs(d.seriesSubs);
      lastSync="☁ "+new Date().toLocaleString("zh-CN");
      nextId=items.length?Math.max(...items.map(i=>i.id))+1:0;
      nextPipeId=pipe.length?Math.max(...pipe.map(p=>p.id))+1:1;
      try{localStorage.setItem("RIGOR_INV",JSON.stringify({items,logs:allLogs,pipe,seriesSubs:getSeriesSubs(),lastSync}));}catch(e){}
      render();
    }
  }catch(e){console.error("Supabase pull error:",e);}
}

async function pollCloud(){
  if(sbSaving||!sbConnected||!sbClient)return;
  try{
    const{data}=await sbClient.from("rigor_inventory").select("updated_at").eq("data_key","main").limit(1).single();
    if(data&&data.updated_at!==_lastSbUpdate){
      _lastSbUpdate=data.updated_at;
      await pullFromCloud();
    }
  }catch(e){}
}

async function pushToCloud(){
  if(!sbConnected||!sbClient)return;
  sbSaving=true;
  try{
    const payload={items,logs:allLogs,pipe,seriesSubs:getSeriesSubs(),lastSync};
    const{data,error}=await sbClient.from("rigor_inventory").upsert({data_key:"main",payload},{onConflict:"data_key"}).select("updated_at").single();
    if(data)_lastSbUpdate=data.updated_at;
    lastSync="☁ "+new Date().toLocaleString("zh-CN");
  }catch(e){console.error("Supabase push error:",e);}
  sbSaving=false;
}

function getSeriesSubs(){return SERIES.map(s=>({id:s.id,sub:s.sub}));}
function applySeriesSubs(subs){if(!subs)return;subs.forEach(ss=>{const sr=SERIES.find(s=>s.id===ss.id);if(sr)sr.sub=ss.sub;});}

function saveState(){
  lastSync=new Date().toLocaleString("zh-CN");
  const seriesSubs=getSeriesSubs();
  try{localStorage.setItem("RIGOR_INV",JSON.stringify({items,logs:allLogs,pipe,seriesSubs,lastSync}));}catch(e){}
  if(sbConnected)pushToCloud();
}

function loadFromStorage(){
  try{
    const s=localStorage.getItem("RIGOR_INV");

function confirmEditCat(oldSeriesId,oldName){
  const newName=document.getElementById("editCatName").value.trim();
  const newSeriesId=document.getElementById("editCatSeries").value;
  document.getElementById("editCatOv").remove();
  if(!newName)return;
  const oldSr=SERIES.find(s=>s.id===oldSeriesId);
  const newSr=SERIES.find(s=>s.id===newSeriesId);
  if(!oldSr||!newSr)return;
  // Check duplicate in target series
  if(newName!==oldName&&newSr.sub.includes(newName)){alert("目标系列中已有同名分类「"+newName+"」");return;}
  // Rename in old series
  const idx=oldSr.sub.indexOf(oldName);
  if(oldSeriesId===newSeriesId){
    // Same series: just rename
    if(idx!==-1)oldSr.sub[idx]=newName;
  }else{
    // Move to new series
    if(idx!==-1)oldSr.sub.splice(idx,1);
    if(!newSr.sub.includes(newName))newSr.sub.push(newName);
  }
  // Update all products
  if(newName!==oldName){items.forEach(d=>{if(d.c===oldName)d.c=newName;});}
  saveState();render();
}

function confirmDelCat(seriesId,catName){

function rAddEdit(d){
  const isEdit=!!d;

  const backView=isEdit?"detail":"list";
  const cats=getCats();
  let h=`<div style="padding:20px"><button onclick="V='${backView}';render()" style="background:none;border:none;color:#6b7280;font-size:13px;cursor:pointer;margin-bottom:12px">← 返回</button>`;
  h+=`<div style="font-size:19px;font-weight:700;color:${isEdit?"#fbbf24":"#818cf8"};margin-bottom:16px">${title}</div>`;
  // Category
  h+=`<div class="form-row"><div class="form-label">产品分类 *（可选已有或输入新分类）</div><select class="inp" id="fCat" onchange="if(this.value==='__new__')document.getElementById('fCatNew').style.display='block';else document.getElementById('fCatNew').style.display='none'"><option value="">请选择</option>`;
  cats.forEach(c=>{h+=`<option value="${c}"${d&&d.c===c?" selected":""}>${c}</option>`;});
  h+=`<option value="__new__">➕ 输入新分类...</option></select>`;

  // Fields - wrapped in grid
  h+=`<div class="form-grid">`;
  const fields=[
    ["s","粒径/规格 *","如 100nm, 2mL, 4.6×50mm"],
    ["f","官能团/类型","如 羧基-COOH, 蛋白A, 无"],
    ["m","型号","如 PS01010CM"],
    ["k","货号","如 PS02N100NA"],
    ["b","内部批号(YYYYMMDD)","如 20260316"],
    ["ln","产线编号(1位)","默认1"],
  ];
  fields.forEach(([key,label,ph])=>{
    h+=`<div class="form-row"><div class="form-label">${label}</div><input class="inp" id="f_${key}" value="${d?d[key]||"":""}" placeholder="${ph}"></div>`;

  h+=`<div class="form-row"><div class="form-label">库存数量</div><input class="inp" type="number" id="f_n" value="${d?d.n:0}"></div>`;

  h+=`<div class="form-row"><div class="form-label">库存状态</div><select class="inp" id="f_t">`;
  getAllStatuses().forEach(s=>{h+=`<option value="${s}"${d&&d.t===s?" selected":""}>${s}</option>`;});
  h+=`</select></div>`;
  // Priority
  h+=`<div class="form-row"><div class="form-label">备货优先级</div><select class="inp" id="f_pr"><option value=""${!d||!d.pr?" selected":""}>— 未设置 —</option>`;
  getPrios().filter(p=>p).forEach(p=>{h+=`<option value="${p}"${d&&d.pr===p?" selected":""}>${p}</option>`;});
  h+=`</select></div>`;
  h+=`</div>`;

  const curEB=d?d.eb:"";
  h+=`<div class="form-row"><div class="form-label">🏷️ 客户批号（自动生成或手动输入，用于标签和COA）</div>`;
  h+=`<div style="display:flex;gap:8px"><input class="inp" id="f_eb" value="${curEB}" placeholder="点右侧按钮自动生成" style="flex:1;font-family:monospace;font-size:15px;letter-spacing:1px"><button class="sm" style="background:#2563eb;white-space:nowrap;padding:8px 14px" onclick="autoGenEB()">自动生成</button></div></div>`;

  if(isEdit){
    h+=`<div style="display:flex;gap:8px"><button class="btn" style="background:#f59e0b" onclick="doEdit(${d.id})">保存修改</button></div>`;
    h+=`<button class="del-btn" style="width:100%;margin-top:10px;padding:10px" onclick="doDelete(${d.id})">🗑️ 删除此产品</button>`;

    h+=`<button class="btn" style="background:#6366f1" onclick="doAdd()">确认新增</button>`;

function getFormData(){
  let cat=document.getElementById("fCat").value;
  if(cat==="__new__"){cat=document.getElementById("fCatNew").value.trim();}
  if(!cat)return null;
  const s=document.getElementById("f_s").value.trim();
  if(!s)return null;
  return{
    c:cat,
    s:s,
    f:document.getElementById("f_f").value.trim(),
    m:document.getElementById("f_m").value.trim(),
    k:document.getElementById("f_k").value.trim(),
    b:document.getElementById("f_b").value.trim(),
    ln:document.getElementById("f_ln").value.trim()||"1",
    eb:document.getElementById("f_eb").value.trim(),
    n:parseInt(document.getElementById("f_n").value)||0,
    t:document.getElementById("f_t").value,
    pr:document.getElementById("f_pr").value,
    o:document.getElementById("f_o").value.trim()
  };
}

function autoGenEB(){
  const cat=document.getElementById("fCat").value;
  const batch=document.getElementById("f_b").value.trim();
  const ln=document.getElementById("f_ln").value.trim()||"1";
  if(!batch||batch.length<8){alert("请先填写内部批号（YYYYMMDD格式）");return;}
  const realCat=(cat==="__new__")?document.getElementById("fCatNew").value.trim():cat;
  const eb=genExtBatch(realCat,batch,ln);
  document.getElementById("f_eb").value=eb;
}

function doAdd(){
  const data=getFormData();
  if(!data){alert("请填写产品分类和粒径/规格");return;}
  // Auto-gen external batch if empty
  if(!data.eb&&data.b)data.eb=genExtBatch(data.c,data.b,data.ln);
  const newItem={id:nextId++,...data,q:String(data.n),qc:{},logs:[],att:[]};
  items.push(newItem);
  const sr=fs(data.c);
  if(!sr.sub.includes(data.c)){SERIES[0].sub.push(data.c);}
  selId=newItem.id;V="detail";render();
}

function doEdit(id){
  const data=getFormData();
  if(!data){alert("请填写产品分类和粒径/规格");return;}
  const d=items.find(i=>i.id===id);if(!d)return;
  // Auto-gen external batch if empty and batch changed
  if(!data.eb&&data.b)data.eb=genExtBatch(data.c,data.b,data.ln);
  Object.assign(d,data);d.q=String(data.n);
  if(!fs(data.c).sub.includes(data.c)){SERIES[0].sub.push(data.c);}
  V="detail";render();
}

function doDelete(id){
  const d=items.find(i=>i.id===id);
  const name=d?(d.s+" "+d.c):"此产品";
  const ov=document.createElement("div");ov.className="overlay";ov.id="delOv";
  ov.innerHTML=`<div class="modal" style="text-align:center;padding:30px">
    <div style="font-size:40px;margin-bottom:12px">🗑️</div>
    <div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:8px">确认删除？</div>
    <div style="font-size:13px;color:#9ca3af;margin-bottom:20px">即将删除「<span style="color:#f87171">${name}</span>」<br>此操作不可撤销</div>

      <button class="btn" style="background:#dc2626;flex:1" onclick="confirmDelete(${id})">确认删除</button>

}
function confirmDelete(id){
  document.getElementById("delOv").remove();

}

function rInOut(){
  const d=items.find(i=>i.id===selId);if(!d)return"";const isIn=modal.tp==="in";const cl=isIn?"#059669":"#dc2626";
  let h=`<div style="padding:16px"><button onclick="V='detail';modal=null;render()" style="background:none;border:none;color:#6b7280;font-size:12px;cursor:pointer;margin-bottom:10px">← 返回</button>`;

  h+=`<div class="form-row"><div class="form-label">数量 *</div><input class="inp" type="number" id="ioQty" placeholder="输入数量"></div>`;

function startIO(id,tp){selId=id;modal={tp};V="inout";render();}
function doIO(){
  const d=items.find(i=>i.id===selId);if(!d)return;
  const qt=parseInt(document.getElementById("ioQty").value);if(!qt||qt<=0)return alert("请输入数量");
  const bt=document.getElementById("ioBat").value,dt=document.getElementById("ioDt").value;
  const pv=d.n,nx=modal.tp==="in"?d.n+qt:Math.max(0,d.n-qt);
  d.n=nx;d.t=nx===0?"缺货":nx<=5?"低库存":"正常";
  if(modal.tp==="in"&&bt){d.b=bt;d.eb=genExtBatch(d.c,bt,d.ln);}
  d.logs.push({tp:modal.tp,qt,bt,dt,pv,nx,eb:d.eb});
  allLogs.push({tp:modal.tp,qt,dt,nm:d.s+" "+d.c});
  modal=null;V="detail";render();
}
function updateIOExtBatch(){
  const d=items.find(i=>i.id===selId);if(!d)return;
  const bt=document.getElementById("ioBat").value.trim();
  const el=document.getElementById("ioExtBat");if(!el)return;
  el.textContent=bt.length>=8?genExtBatch(d.c,bt,d.ln):"—";
}

function toggleQC(id,qid){const d=items.find(i=>i.id===id);if(d){d.qc[qid]=!d.qc[qid];render();}}
function setPrio(id,pr){const d=items.find(i=>i.id===id);if(d){d.pr=pr;render();}}

function pickAT(btn){

function updPrev(){document.getElementById("attPrev").textContent=window._fp+"/"+window._at.dir+"/"+document.getElementById("attNm").value;}
function addAtt(id){

function delAtt(id,aid){const d=items.find(i=>i.id===id);d.att=d.att.filter(a=>a.aid!==aid);render();}

let pipeEditId=null; // null=list, -1=new, else=editing id
let nextPipeId=pipe.length?Math.max(...pipe.map(p=>p.id))+1:1;

function rPipe(){
  if(pipeEditId!==null) return rPipeEdit();

  const isNew=pipeEditId===-1;

  h+=`<div class="form-row"><div class="form-label">优先级 *</div><select class="inp" id="pPr"><option value="P0"${p&&p.pr==="P0"?" selected":""}>🔴 P0 猛攻</option><option value="P1"${p&&p.pr==="P1"?" selected":""}>🟠 P1 顺手</option><option value="Done"${p&&p.pr==="Done"?" selected":""}>✅ 已完成</option></select></div>`;
  h+=`<div class="form-row"><div class="form-label">阶段</div><input class="inp" id="pPh" value="${p?p.ph:""}" placeholder="如: Week 1-2"></div>`;
  h+=`<div class="form-row"><div class="form-label">状态</div><select class="inp" id="pSt"><option value="待启动"${p&&p.st==="待启动"?" selected":""}>待启动</option><option value="进行中"${p&&p.st==="进行中"?" selected":""}>进行中</option><option value="已完成"${p&&p.st==="已完成"?" selected":""}>已完成</option><option value="待包装"${p&&p.st==="待包装"?" selected":""}>待包装</option></select></div>`;

function getPipeForm(){
  const nm=document.getElementById("pNm").value.trim();
  if(!nm){alert("请填写项目名称");return null;}
  return{nm,pr:document.getElementById("pPr").value,ph:document.getElementById("pPh").value.trim(),st:document.getElementById("pSt").value,tg:document.getElementById("pTg").value.trim(),nt:document.getElementById("pNt").value.trim()};
}

function doAddPipe(){
  const d=getPipeForm();if(!d)return;
  pipe.push({id:nextPipeId++,...d});

}

function doEditPipe(id){
  const d=getPipeForm();if(!d)return;
  const p=pipe.find(x=>x.id===id);if(!p)return;
  Object.assign(p,d);
  pipeEditId=null;render();
}

function confirmDelPipe(id){
